services:
  frontend:
    image: nginx:alpine
    container_name: vestis_frontend
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wardrobe-shared
    restart: on-failure

networks:
  wardrobe-shared:
    external: true
    name: ${WARDROBE_DOCKER_NETWORK:-wardrobe-service_wardrobe-network}
